server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container JSON logs. We only keep the gateway container and
  # label its lines so the dashboard can filter on job="gateway".
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["gateway-pink-gateway"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: '/(.*)'
        target_label: container
      - target_label: job
        replacement: gateway
    # The gateway writes newline-delimited pino JSON. Promtail keeps the raw
    # line as a log line; the JSON fields (level, endpoint, status, latency_ms,
    # request_id) are queryable in Loki via the json parser.
    pipeline_stages:
      - json:
          expressions:
            level: level
            endpoint: endpoint
            status: status
            request_id: request_id
            msg: msg
      - labels:
          level:
          endpoint:
